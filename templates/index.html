<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 30px auto; padding: 0 15px; }
    h1, h2 { color: #333; }
    form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    input, select { padding: 6px; flex: 1; min-width: 120px; }
    button { padding: 6px 12px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    .error { color: red; margin-bottom: 10px; }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .empty { color: #888; font-style: italic; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
    .tab-btn { padding: 10px 16px; border: none; background: none; cursor: pointer; font-size: 15px; border-bottom: 3px solid transparent; }
    .tab-btn.active { border-bottom: 3px solid #333; font-weight: bold; }
</style>
</head>
<body>

<h1>Expense Tracker</h1>

<div id="errorBox" class="error"></div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab('add')">Add Expense</button>
    <button class="tab-btn" onclick="showTab('summary')">Monthly Summary</button>
    <button class="tab-btn" onclick="showTab('list')">All Expenses</button>
</div>

<div id="tab-add" class="tab-content">
<h2>Add Expense</h2>
<form id="expenseForm">
    <input type="hidden" id="editId" value="">
    <input type="text" id="title" placeholder="Title (e.g. Coffee at Starbucks)" required>
    <input type="number" id="amount" placeholder="Amount" step="0.01" min="0.01" required>
    <select id="category" required>
        <option value="">Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
    </select>
    <input type="date" id="date">
    <input type="text" id="note" placeholder="Note (optional)">
    <button type="submit" id="submitBtn">Add Expense</button>
    <button type="button" id="cancelEditBtn" style="display:none;">Cancel</button>
</form>

</div>

<div id="tab-summary" class="tab-content" style="display:none;">
<h2>Monthly Summary</h2>
<div id="summaryBox"></div>
</div>

<div id="tab-list" class="tab-content" style="display:none;">
<h2>Filters</h2>
<div class="filters">
    <select id="filterCategory">
        <option value="">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
    </select>
    <input type="date" id="filterDateFrom" title="From date">
    <input type="date" id="filterDateTo" title="To date">
    <input type="text" id="filterTitle" placeholder="Search title">
    <button id="applyFilters">Apply</button>
    <button id="clearFilters">Clear</button>
</div>

<h2>All Expenses</h2>
<div id="expenseList"></div>
</div>

<script>
function showTab(tabName) {
    document.querySelectorAll(".tab-content").forEach(el => el.style.display = "none");
    document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));

    document.getElementById("tab-" + tabName).style.display = "block";
    event.target.classList.add("active");

    if (tabName === "summary") loadSummary();
    if (tabName === "list") loadExpenses();
}

const API = "/api/expenses";

function showError(msg) {
    const box = document.getElementById("errorBox");
    box.textContent = msg;
    setTimeout(() => box.textContent = "", 4000);
}

async function loadExpenses() {
    const category = document.getElementById("filterCategory").value;
    const dateFrom = document.getElementById("filterDateFrom").value;
    const dateTo = document.getElementById("filterDateTo").value;
    const title = document.getElementById("filterTitle").value;

    const params = new URLSearchParams();
    if (category) params.append("category", category);
    if (dateFrom) params.append("date_from", dateFrom);
    if (dateTo) params.append("date_to", dateTo);
    if (title) params.append("title", title);

    const res = await fetch(`${API}?${params.toString()}`);
    const expenses = await res.json();

    const container = document.getElementById("expenseList");

    if (expenses.length === 0) {
        container.innerHTML = '<p class="empty">No expenses found.</p>';
        return;
    }

    let html = "<table><tr><th>Date</th><th>Title</th><th>Category</th><th>Amount</th><th>Note</th><th>Actions</th></tr>";
    for (const e of expenses) {
        html += `<tr>
            <td>${e.date}</td>
            <td>${e.title}</td>
            <td>${e.category}</td>
            <td>₹${e.amount.toFixed(2)}</td>
            <td>${e.note || ""}</td>
            <td>
                <button onclick="editExpense(${e.id}, '${e.title}', ${e.amount}, '${e.category}', '${e.date}', '${e.note || ""}')">Edit</button>
                <button onclick="deleteExpense(${e.id})">Delete</button>
            </td>
        </tr>`;
    }
    html += "</table>";
    container.innerHTML = html;
}

async function loadSummary() {
    const res = await fetch("/api/summary");
    const data = await res.json();

    let html = `<p><strong>Total spent this month:</strong> ₹${data.total.toFixed(2)}</p>`;
    if (Object.keys(data.breakdown).length === 0) {
        html += '<p class="empty">No expenses this month yet.</p>';
    } else {
        html += "<ul>";
        for (const [cat, amt] of Object.entries(data.breakdown)) {
            html += `<li>${cat}: ₹${amt.toFixed(2)}</li>`;
        }
        html += "</ul>";
    }
    document.getElementById("summaryBox").innerHTML = html;
}

document.getElementById("expenseForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const editId = document.getElementById("editId").value;
    const payload = {
        title: document.getElementById("title").value,
        amount: parseFloat(document.getElementById("amount").value),
        category: document.getElementById("category").value,
        date: document.getElementById("date").value,
        note: document.getElementById("note").value,
    };

    const url = editId ? `${API}/${editId}` : API;
    const method = editId ? "PUT" : "POST";

    const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
    });

    const result = await res.json();

    if (!res.ok) {
        showError(result.error || "Something went wrong");
        return;
    }

    resetForm();
    loadExpenses();
    loadSummary();
});

function editExpense(id, title, amount, category, date, note) {
    document.getElementById("editId").value = id;
    document.getElementById("title").value = title;
    document.getElementById("amount").value = amount;
    document.getElementById("category").value = category;
    document.getElementById("date").value = date;
    document.getElementById("note").value = note;
    document.getElementById("submitBtn").textContent = "Update Expense";
    document.getElementById("cancelEditBtn").style.display = "inline-block";
    showTab('add');
    document.querySelectorAll(".tab-btn")[0].classList.add("active");
}

function resetForm() {
    document.getElementById("expenseForm").reset();
    document.getElementById("editId").value = "";
    document.getElementById("submitBtn").textContent = "Add Expense";
    document.getElementById("cancelEditBtn").style.display = "none";
}

document.getElementById("cancelEditBtn").addEventListener("click", resetForm);

async function deleteExpense(id) {
    if (!confirm("Delete this expense?")) return;
    const res = await fetch(`${API}/${id}`, { method: "DELETE" });
    if (!res.ok) {
        const result = await res.json();
        showError(result.error || "Could not delete");
        return;
    }
    loadExpenses();
    loadSummary();
}

document.getElementById("applyFilters").addEventListener("click", loadExpenses);
document.getElementById("clearFilters").addEventListener("click", () => {
    document.getElementById("filterCategory").value = "";
    document.getElementById("filterDateFrom").value = "";
    document.getElementById("filterDateTo").value = "";
    document.getElementById("filterTitle").value = "";
    loadExpenses();
});

// Initial load
loadExpenses();
loadSummary();
</script>

</body>
</html>
